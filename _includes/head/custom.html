<style>
  body,
  .initial-content,
  .page__content {
    background-color: #f6f6f6;
  }

  .masthead,
  .greedy-nav {
    background-color: #1F2D5C;
  }

  .masthead {
    border-bottom: 0;
  }

  .greedy-nav a,
  .greedy-nav .visible-links a,
  .greedy-nav .site-title {
    color: #fff !important;
  }

  .greedy-nav button {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.65);
  }

  .greedy-nav .navicon,
  .greedy-nav .navicon:before,
  .greedy-nav .navicon:after {
    background: #fff;
  }

  a,
  a:visited,
  .page__content a,
  .author__urls a {
    color: #1F2D5C;
  }

  a:hover,
  a:focus,
  .page__content a:hover,
  .author__urls a:hover {
    color: #1F2D5C;
  }

  .author__avatar,
  .author__avatar img {
    border-radius: 0 !important;
  }

  .author__avatar {
    max-width: 900px;
  }

  .author__avatar img {
    width: 900px;
    max-width: 100%;
    height: auto;
  }

  @media (max-width: 768px) {
    .page {
      padding-left: 1rem !important;
      padding-right: 1rem !important;
    }

    .page__content {
      font-size: 1rem;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .masthead__menu-item--lg a {
      font-size: 1.05rem;
    }

    .author__urls li {
      line-height: 1.5;
    }

    .author__avatar {
      max-width: 760px;
    }

    .author__avatar img {
      width: 760px;
    }

    .page__content div[style*="overflow:auto"] {
      overflow: visible !important;
    }

    .page__content span[style*="float:right"],
    .page__content div[style*="float:right"] {
      float: none !important;
      display: block;
      text-align: left !important;
      margin-top: 2px;
    }
  }
</style>
